name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CARVES.Runtime.sln

      - name: Build
        run: dotnet build CARVES.Runtime.sln --no-restore --configuration Release

      - name: Guard Beta proof lane
        shell: pwsh
        run: ./scripts/beta/guard-beta-proof-lane.ps1 -Configuration Release -SkipBuild

      - name: Shield GitHub Actions proof lane
        shell: pwsh
        run: ./scripts/shield/shield-github-actions-proof.ps1 -Configuration Release -SkipBuild

      - name: Test
        run: dotnet test CARVES.Runtime.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload Shield proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shield-proof-${{ matrix.os }}
          path: artifacts/shield
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults
